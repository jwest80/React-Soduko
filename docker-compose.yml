version: '3.8'

services:
  sudoku:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - SKIP_PREFLIGHT_CHECK=true
      - DISABLE_ESLINT_PLUGIN=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
